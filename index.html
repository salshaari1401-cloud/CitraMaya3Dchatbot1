
<style>
*{box-sizing:border-box;margin:0;padding:0}
.wrap{background:linear-gradient(160deg,#1a0845 0%,#2d1280 40%,#1565c0 100%);border-radius:20px;overflow:hidden;display:flex;flex-direction:column;font-family:Arial,sans-serif}
.header{padding:20px 20px 14px;display:flex;flex-direction:column;align-items:center;gap:6px}
.robot-scene{position:relative;width:110px;height:130px;margin:0 auto}
.robot-body{animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.robot-shadow{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:50px;height:8px;border-radius:50%;background:rgba(0,0,0,0.3);animation:shadow-pulse 3s ease-in-out infinite}
@keyframes shadow-pulse{0%,100%{width:50px;opacity:0.35}50%{width:36px;opacity:0.15}}
.eye-l{transform-origin:41px 78px;animation:blink-eye 4s ease-in-out infinite}
.eye-r{transform-origin:69px 78px;animation:blink-eye 4s ease-in-out infinite}
@keyframes blink-eye{0%,90%,100%{transform:scaleY(1)}95%{transform:scaleY(0.08)}}
.hd-title{color:#fff;font-size:20px;font-weight:700;letter-spacing:1px}
.hd-sub{color:#b0c4ff;font-size:11px;text-align:center}
.online{display:flex;align-items:center;gap:5px;font-size:11px;color:rgba(255,255,255,0.6)}
.dot{width:6px;height:6px;border-radius:50%;background:#4ade80;animation:blink 2s ease infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}

.chatframe{margin:0 14px 14px;background:#fff;border-radius:16px;overflow:hidden;display:flex;flex-direction:column}

.msgs{padding:14px;display:flex;flex-direction:column;gap:10px;overflow-y:auto;max-height:250px;background:#fff}
.row{display:flex;gap:8px;align-items:flex-end}
.row.user{flex-direction:row-reverse}
.av{width:28px;height:28px;border-radius:50%;background:#3b1fa8;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px}
.bubble{padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.5;max-width:82%}
.bubble.bot{background:#ede9ff;color:#1a0845;border-radius:4px 14px 14px 14px;border:1px solid #d0c5ff}
.bubble.user{background:#3b1fa8;color:#fff;border-radius:14px 4px 14px 14px}
.bubble b{font-weight:700}
.typing{display:flex;gap:4px;padding:10px 14px;background:#ede9ff;border-radius:4px 14px 14px 14px;border:1px solid #d0c5ff}
.typing span{width:6px;height:6px;border-radius:50%;background:#7c4dff;animation:bop 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes bop{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

.chips{display:flex;flex-wrap:wrap;gap:6px;padding:10px 14px;background:#f5f3ff;border-top:1px solid #e4deff}
.chip{background:#fff;border:1px solid #c5b8ff;color:#3b1fa8;padding:6px 12px;border-radius:999px;font-size:12px;cursor:pointer;transition:all .15s}
.chip:hover{background:#3b1fa8;color:#fff;border-color:#3b1fa8}

.inp-row{display:flex;gap:8px;padding:10px 14px;background:#f5f3ff;border-top:1px solid #e4deff;align-items:center}
.inp-row input{flex:1;background:#fff;border:1px solid #c5b8ff;border-radius:999px;padding:10px 16px;color:#1a0845;font-size:13px;outline:none;transition:all .2s}
.inp-row input::placeholder{color:#aaa}
.inp-row input:focus{border-color:#5b2be0}
.send-btn{width:36px;height:36px;border-radius:50%;background:#3b1fa8;border:none;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:background .15s}
.send-btn:hover{background:#5b2be0}
.send-btn svg{width:15px;height:15px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
</style>

<div class="wrap">
  <div class="header">
    <div class="robot-scene">
      <svg class="robot-body" width="110" height="122" viewBox="0 0 110 140" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="35" y="110" width="40" height="26" rx="13" fill="#dde8ff"/>
        <rect x="40" y="115" width="30" height="16" rx="7" fill="#c5d5ff"/>
        <ellipse cx="55" cy="121" rx="5.5" ry="7" fill="#7c4dff" opacity="0.7"/>
        <ellipse cx="55" cy="121" rx="3" ry="4.5" fill="#40c4ff"/>
        <rect x="15" y="114" width="18" height="14" rx="7" fill="#dde8ff"/>
        <rect x="77" y="114" width="18" height="14" rx="7" fill="#dde8ff"/>
        <ellipse cx="55" cy="88" rx="35" ry="32" fill="#dde8ff"/>
        <ellipse cx="55" cy="88" rx="33" ry="30" fill="#eef3ff"/>
        <rect x="23" y="62" width="64" height="40" rx="20" fill="#1a1a2e"/>
        <g class="eye-l"><ellipse cx="41" cy="78" rx="9" ry="12" fill="#40c4ff" opacity="0.9"/><ellipse cx="41" cy="78" rx="5" ry="7" fill="#0d47a1"/><ellipse cx="43" cy="76" rx="2" ry="2.5" fill="#82e0ff" opacity="0.8"/></g>
        <g class="eye-r"><ellipse cx="69" cy="78" rx="9" ry="12" fill="#40c4ff" opacity="0.9"/><ellipse cx="69" cy="78" rx="5" ry="7" fill="#0d47a1"/><ellipse cx="71" cy="76" rx="2" ry="2.5" fill="#82e0ff" opacity="0.8"/></g>
        <path d="M46 93 Q55 98 64 93" stroke="#40c4ff" stroke-width="2" stroke-linecap="round" fill="none"/>
        <rect x="45" y="58" width="20" height="6" rx="3" fill="#c5d5ff"/>
        <rect x="52" y="52" width="6" height="9" rx="3" fill="#aab8e8"/>
        <ellipse cx="55" cy="51" rx="4" ry="4" fill="#7c4dff"/>
        <ellipse cx="55" cy="51" rx="2" ry="2" fill="#40c4ff"/>
      </svg>
      <div class="robot-shadow"></div>
    </div>
    <div class="hd-title">CitraBot AI</div>
    <div class="hd-sub">Pembantu Pintar Kurator Maya · CitraMaya 3D Hub Centre 2.0</div>
    <div class="online"><span class="dot"></span>Dalam talian</div>
  </div>

  <div class="chatframe">
    <div class="msgs" id="msgs">
      <div class="row">
        <div class="av">🤖</div>
        <div class="bubble bot">Hai! Saya <b>CitraBot AI</b>. Boleh saya bantu anda hari ini? Cuba tanya tentang <b>Galeri Maya</b>, <b>e-Portfolio</b>, <b>Repositori Karya</b> atau <b>Pentaksiran</b>.</div>
      </div>
    </div>
    <div class="chips">
      <button class="chip" onclick="ask('Cara masuk galeri maya')">Galeri Maya</button>
      <button class="chip" onclick="ask('Cara hantar karya')">Hantar Karya</button>
      <button class="chip" onclick="ask('Cara bina e-Portfolio')">e-Portfolio</button>
      <button class="chip" onclick="ask('Cara lihat rubrik')">Rubrik</button>
      <button class="chip" onclick="ask('Apa fungsi CitraMaya')">Fungsi CitraMaya</button>
    </div>
    <div class="inp-row">
      <input id="inp" placeholder="Taip soalan anda..." onkeydown="if(event.key==='Enter')send()">
      <button class="send-btn" onclick="send()" aria-label="Hantar">
        <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2" fill="#fff" stroke="none"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
const KB=[
  {k:["masuk","galeri","spatial","maya"],a:"Untuk masuk ke <b>Galeri Maya</b>, klik menu <b>Galeri Maya</b>, pilih kursus berkaitan, kemudian tekan butang <b>Masuk ke Spatial Gallery</b>. Anda boleh meneroka pameran 3D secara langsung dari pelayar web."},
  {k:["hantar","upload","muat naik","karya","submit"],a:"Untuk menghantar karya, klik menu <b>Repositori Karya</b>, pilih folder kursus anda, kemudian muat naik fail karya mengikut arahan pensyarah. Pastikan format fail adalah betul sebelum dihantar."},
  {k:["portfolio","e-portfolio","eportfolio"],a:"Untuk membina <b>e-Portfolio</b>, sediakan: maklumat diri, hasil karya, proses penghasilan, refleksi pembelajaran dan pautan digital karya — semuanya boleh disusun dalam platform CitraMaya."},
  {k:["rubrik","markah","pentaksiran","penilaian"],a:"Untuk melihat rubrik, klik menu <b>Pentaksiran</b>. Rubrik disediakan mengikut tugasan, hasil pembelajaran kursus dan kriteria penilaian yang ditetapkan oleh pensyarah."},
  {k:["fungsi","citramaya","hub","pusat","platform"],a:"<b>CitraMaya 3D Hub Centre 2.0</b> adalah pusat sehenti untuk: Galeri Maya 3D, Repositori Karya, e-Portfolio, Pentaksiran Digital dan Sokongan AI — khas untuk Pendidikan Seni Visual."},
  {k:["bantuan","pensyarah","masalah","error"],a:"Jika menghadapi masalah teknikal, sila rujuk pensyarah kursus atau pentadbir sistem CitraMaya 3D Hub Centre 2.0."}
];
function addMsg(txt,type){
  const box=document.getElementById('msgs');
  const d=document.createElement('div');
  d.className='row '+(type==='user'?'user':'');
  if(type==='bot') d.innerHTML='<div class="av">🤖</div><div class="bubble bot">'+txt+'</div>';
  else d.innerHTML='<div class="bubble user">'+txt+'</div>';
  box.appendChild(d);box.scrollTop=box.scrollHeight;
}
function showTyping(){
  const box=document.getElementById('msgs');
  const d=document.createElement('div');
  d.className='row';d.id='typ';
  d.innerHTML='<div class="av">🤖</div><div class="typing"><span></span><span></span><span></span></div>';
  box.appendChild(d);box.scrollTop=box.scrollHeight;
}
function getAns(q){
  q=q.toLowerCase();
  for(let i of KB) if(i.k.some(k=>q.includes(k))) return i.a;
  return "Maaf, saya belum ada jawapan khusus untuk soalan ini. Cuba tanya tentang <b>galeri maya</b>, <b>e-Portfolio</b>, <b>repositori karya</b> atau <b>rubrik pentaksiran</b>.";
}
function send(){
  const inp=document.getElementById('inp');
  const q=inp.value.trim();if(!q)return;
  addMsg(q,'user');inp.value='';
  showTyping();
  setTimeout(()=>{const t=document.getElementById('typ');if(t)t.remove();addMsg(getAns(q),'bot');},700);
}
function ask(t){document.getElementById('inp').value=t;send();}
</script>
